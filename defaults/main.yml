komodo_version: "2.0.0"

## OUTBOUND CONNECTION SETTINGS ##

# The websocket address of komodo core connecting to. i.e. wss://komodo.example.com or ws://IP:PORT
komodo_core_address: ""
# Private key used for authentication. Leave blank to auto-generate (recommended).
komodo_private_key: ""
# The name of the "server" in komodo core to "connect as". Defaults to inventory_hostname
komodo_connect_as: "{{ inventory_hostname }}"
# In outbound mode, this is the onboarding key used to register with komodo core.
# It allows for a new server to be created on core side automatically.
komodo_onboarding_key: ""

## INBOUND CONNECTION SETTINGS ##

# Whether komodo periphery should run in server mode (inbound connections) or client mode (outbound connections).
# Default behavior automatically selects mode based on whether komodo_core_address is defined (outbound mode)
komodo_server_enabled: >-
  {{
    (komodo_core_address | default('') | string | trim | length) == 0
  }}

# Public key of komodo core. In outbound mode, this is for "pinning" to specifc core instances.
# In inbound mode, this is the public key clients will use to authenticate with core.
# If we're in outbound mode, default to a file: reference.
# The idea being that we will by default create the file, and komodo will
# pin the core pubkey on first connection.
komodo_core_public_key: >-
  {{
    komodo_server_enabled
      | ternary('', 'file:' ~ komodo_root_directory ~ '/keys/core.pub')
  }}

# Address to bind the komodo periphery server to in inbound mode.
komodo_bind_ip: "[::]"

# Allowed client IPs/CIDRs for inbound connections. Leave empty to allow all.
komodo_allowed_ips: []
#############

# The http(s) address of komodo core. Used for API access or for probing /version input
# Prefer komodo_core_url if provided for backwards compatibility otherwise derive from WS address.
komodo_core_http_address: >-
  {{
    (komodo_core_url | default('', true) | string | trim)
      | default(
          (
            ([komodo_core_address] | default([], true) | flatten
             | map('string') | map('trim') | reject('equalto','') | list
             | first | default('')
            )
            | regex_replace('^wss://','https://')
            | regex_replace('^ws://','http://')
          ),
          true
        )
      | regex_replace('/+$','')
  }}

# This defines the systemd service scope.
# "user" will run the service as a user service (default, recommended)
# "system" will run the service as a system service, running as the komodo_user
komodo_service_scope: "user"

# Allows creation of the komodo user if needed
allow_create_komodo_user: "{{ (komodo_action | default('update')) == 'install' }}"
# Allows modification of the komodo user if needed (i.e. add to docker group, enable/disable linger)
allow_modify_komodo_user: true
# Allows deletion of the komodo user during uninstall
allow_delete_komodo_user: false
# Allows materialzing raw keys to files instead of keeping them in config file, which allows easier key rotation.
allow_write_keys_to_files: true
# Use this when you need to replace key file contents from playbook run.
# By default, it will only write files that don't exist yet,  so that rotated keys aren't overwritten with old keys.
allow_overwrite_key_files: false

# Add name/value pairs containing secrets that periphery will have internal access to
# Example:
#   komodo_agent_secrets:
#     - name: "SECRET_1"
#       value: "supersecret1"
#     - name: "SECRET_2"
#       value: "supersecret2"
komodo_agent_secrets: []

# Add name/value pairs containing extra env variables available to komodo periphery environment
# Example:
#   komodo_extra_env:
#     - name: "EXTRA_ENV_NAME"
#       value: "extra_env_value"
komodo_extra_env: []

komodo_user: "komodo"
komodo_group: "{{ komodo_user }}"

komodo_home: "/home/{{ komodo_user }}"
komodo_bin_dir: "{{ komodo_home }}/.local/bin"
komodo_bin_path: "{{ komodo_bin_dir }}/periphery"

komodo_config_dir: "{{ komodo_home }}/.config/komodo"
# default config template
komodo_config_file_template: "periphery.config.toml.j2"
komodo_config_path: "{{ komodo_config_dir }}/periphery.config.toml"

# default service template
komodo_service_file_template: "periphery.service.j2"

komodo_periphery_port: "{{ periphery_port | default(8120, true) }}"

komodo_root_directory: "{{ root_dir | default(komodo_home ~ '/.komodo', true) }}"
komodo_repo_dir: "{{ repo_dir  | default(komodo_root_directory ~ '/repos',  true) }}"
komodo_stack_dir: "{{ stack_dir | default(komodo_root_directory ~ '/stacks', true) }}"
komodo_build_dir: "{{ build_dir | default(komodo_root_directory ~ '/build',  true) }}"

komodo_stats_polling_rate: "{{ stacks_polling_rate | default('5-sec', true) }}"

komodo_ssl_enabled: "{{ ssl_enabled | default(true, true) }}"
komodo_ssl_key_file: ""
komodo_ssl_cert_file: ""

komodo_logging_level: "{{ logging_level | default('info', true) }}"
komodo_logging_stdio: "{{ logging_stdio | default('standard', true) }}"
komodo_logging_opentelemetry_service_name: "{{ logging_opentelemetry_service_name | default('Komodo-Periphery', true) }}"
komodo_logging_otlp_endpoint: ""
komodo_logging_pretty: false
komodo_logging_pretty_startup_config: false

komodo_disable_terminals: false
komodo_default_terminal_command: "bash"
komodo_disable_container_exec: false
komodo_container_stats_polling_rate: "30-sec"
komodo_legacy_compose_cli: false
komodo_include_disk_mounts: []
komodo_exclude_disk_mounts: []

# Define periphery specific git providers
# Example:
# komodo_git_providers:
#  - domain: "github.com"
#    accounts:
#      - username: "alice"
#        token: !vault |
#          $ANSIBLE_VAULT;1.1;AES256
#          <redacted>
#      - username: "bob"
#        token: !vault |
#          $ANSIBLE_VAULT;1.1;AES256
#          <redacted>
komodo_git_providers: []

# Define periphery specific registry providers
# Example:
# komodo_registry_providers:
#  - domain: "ghcr.io"
#    organizations: "MyOrg"
#    accounts:
#      - username: "alice"
#        token: !vault |
#          $ANSIBLE_VAULT;1.1;AES256
#          <redacted>
#      - username: "bob"
#        token: !vault |
#          $ANSIBLE_VAULT;1.1;AES256
#          <redacted>
komodo_registry_providers: []

# Server management functions. Not as useful with komodo v2.0.0+ and outbound connections.
enable_server_management: false
komodo_core_api_key: ""
komodo_core_api_secret: ""
server_name: "{{ inventory_hostname }}"
server_address: "" # Leave blank to try and autodetect

# Override komodo_bin name directly if needed for a custom build
komodo_bin: ""
# Download settings. GitHub should be used unless you are using a dev build not available on github yet.
komodo_download_source: "github"

# Host to delegate Komodo Core API calls to. Needed for version checks and server management.
# By default, localhost is used under the assumption it can reach the Komodo Core server.
# Override this if a different host in your inventory has network access to Core.
komodo_api_delegate_to: "localhost"
