---
- name: Manage Komodo Periphery Service
  hosts: komodo
  roles:
    - role: bpbradley.komodo
      # Default action / version. Can be overriden on command line with -e
      komodo_action: "install"
      komodo_version: "core"
      # Because we are using `core` version, we need to specify the core address
      # to query the /version endpoint.
      komodo_core_http_address: "https://komodo.example.com" # or http://IP:9120..
